<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WordConnect Component Demo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="min-h-screen bg-slate-100 flex items-center justify-center p-4">
  <div id="root" class="w-full max-w-lg"></div>

  <script type="text/babel">
    function shuffle(chars) {
      const a = [...chars];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function WordConnect() {
      const brands = ["PUMA", "NIKE", "ADIDAS"];
      const [target, setTarget] = React.useState("NIKE");
      const [letters, setLetters] = React.useState(() => shuffle("NIKE".split("")));
      const [picked, setPicked] = React.useState([]);
      const [result, setResult] = React.useState("");

      function choose(letter, idx) {
        if (picked.find((x) => x.idx === idx)) return;
        setPicked((prev) => [...prev, { letter, idx }]);
      }

      function clear() {
        setPicked([]);
        setResult("");
      }

      function submit() {
        const word = picked.map((x) => x.letter).join("");
        if (brands.includes(word)) {
          setResult(`Great! Brand preference recorded: ${word}`);
        } else {
          setResult(`Not a valid brand. Try ${target}`);
        }
      }

      function randomizeRound() {
        const next = brands[Math.floor(Math.random() * brands.length)];
        setTarget(next);
        setLetters(shuffle(next.split("")));
        setPicked([]);
        setResult("");
      }

      return (
        <div className="rounded-2xl border border-slate-200 bg-white shadow-md p-5">
          <h2 className="text-lg font-semibold">WordConnect (Demo)</h2>
          <p className="text-sm text-slate-600 mt-1">Wordscapes-style brand puzzle for preference capture.</p>

          <div className="mt-4 rounded-xl border p-4">
            <p className="text-sm">Form one of: <span className="font-semibold">PUMA / NIKE / ADIDAS</span></p>
            <p className="text-xs text-slate-500 mt-1">Hint target: {target}</p>

            <div className="mt-3 flex flex-wrap gap-2 min-h-8">
              {picked.map((p, i) => (
                <span key={p.idx + "-" + i} className="rounded bg-slate-900 text-white px-2 py-1 text-sm">{p.letter}</span>
              ))}
            </div>

            <div className="mt-4 flex flex-wrap gap-2">
              {letters.map((letter, idx) => {
                const used = !!picked.find((x) => x.idx === idx);
                return (
                  <button
                    key={idx}
                    disabled={used}
                    onClick={() => choose(letter, idx)}
                    className="h-10 w-10 rounded-full bg-indigo-600 text-white font-semibold disabled:opacity-30"
                  >
                    {letter}
                  </button>
                );
              })}
            </div>

            <div className="mt-4 flex gap-2">
              <button onClick={clear} className="rounded-lg border px-3 py-1.5 text-sm">Clear</button>
              <button onClick={submit} className="rounded-lg bg-slate-900 text-white px-3 py-1.5 text-sm">Submit</button>
              <button onClick={randomizeRound} className="rounded-lg bg-amber-100 border border-amber-300 px-3 py-1.5 text-sm">New Round</button>
            </div>

            {result && <p className="mt-3 text-sm font-medium">{result}</p>}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<WordConnect />);
  </script>
</body>
</html>
